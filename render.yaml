# Render Blueprint
#
# Two services, deployed and scaled independently:
#   - voting-booth-backend  (Node web service)
#   - voting-booth-frontend (Static site, Vite build)
#
# Both env-var values (VITE_API_BASE and CORS_ORIGIN) are marked `sync: false`,
# meaning Render creates the variables but expects you to populate them
# manually in the dashboard after first deploy. This avoids the chicken-
# and-egg problem of services referencing each other before their URLs exist.
#
# After first deploy:
#   1. Copy the backend service URL.
#   2. Set VITE_API_BASE on the frontend service to that URL, then redeploy.
#   3. Copy the frontend service URL.
#   4. Set CORS_ORIGIN on the backend to that URL, then redeploy.

services:
  - type: web
    name: voting-booth-backend
    runtime: node
    plan: free
    rootDir: packages/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: voting-booth-frontend
    runtime: static
    rootDir: packages/frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
