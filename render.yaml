# Render Blueprint — single web service that builds the Vite frontend and
# serves it from the Express backend. Same-origin /api calls, no CORS
# wiring, no VITE_API_BASE.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: voting-booth
    runtime: node
    plan: free
    # Run from the repo root so npm workspaces resolve correctly.
    # --include=dev is REQUIRED: NODE_ENV=production (below) makes npm skip
    # devDependencies by default, which would omit Vite and break `vite build`.
    buildCommand: npm install --include=dev && npm run build:frontend
    startCommand: npm run start:backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
